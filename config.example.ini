[growatt]
# Je Growatt API token (32 karakters)
# Haal deze op via: https://openapi.growatt.com → API Management → Create API Account
api_token = your_32_character_api_token_here

# Regio van je Growatt account
# Opties: china, international, north_america, australia
region = international

[schedule]
# Actieve uren (enkel tussen deze uren wordt het script uitgevoerd)
# Formaat: 24-uurs notatie (0-23)
start_hour = 7
end_hour = 18

[devices]
# Optioneel: specifieke device serial numbers (komma-gescheiden)
# Laat leeg om alle devices te controleren
# Voorbeeld: device_serial_numbers = ABC1234567, DEF9876543
device_serial_numbers =

# Noah devices uitsluiten (deze ondersteunen geen remote on/off)
exclude_noah = true

[retry]
# Retry instellingen voor het aanzetten van omvormers
# Maximaal aantal pogingen bij timeout
max_retries = 3

# Wachttijd tussen pogingen (in seconden)
# Let op: min 60 seconden i.v.m. API rate limits
retry_delay = 60
